{% load static %}
<!-- Reusable Modal Component -->
<!-- Usage: Include this template with modal_id parameter -->

<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_id }}Label" aria-hidden="true" data-modal-id="{{ modal_id }}">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <!-- Modal Header -->
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="{{ modal_id }}Label">
                    {{ modal_title|default:"Confirmation" }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <!-- Modal Body -->
            <div class="modal-body py-4">
                <p class="mb-0" id="{{ modal_id }}Body">
                    {{ modal_body|default:"Are you sure?" }}
                </p>
            </div>
            
            <!-- Modal Footer -->
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="button" class="btn btn-primary rounded-pill px-4" id="{{ modal_id }}Confirm" data-modal-confirm="{{ modal_id }}">
                    OK
                </button>
            </div>
        </div>
    </div>
</div>
