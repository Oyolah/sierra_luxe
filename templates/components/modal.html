<!-- Reusable Modal Component -->
<!-- Usage: Include this template with modal_id parameter -->

<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_id }}Label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <!-- Modal Header -->
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="{{ modal_id }}Label">
                    {{ modal_title|default:"Confirmation" }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <!-- Modal Body -->
            <div class="modal-body py-4">
                <p class="mb-0" id="{{ modal_id }}Body">
                    {{ modal_body|default:"Are you sure?" }}
                </p>
            </div>
            
            <!-- Modal Footer -->
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="button" class="btn btn-primary rounded-pill px-4" id="{{ modal_id }}Confirm">
                    OK
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Modal Backdrop */
    .modal-backdrop.show {
        opacity: 0.5;
    }
    
    /* Modal Animation */
    .modal.fade .modal-dialog {
        transition: transform 0.3s ease-out;
        transform: scale(0.9);
    }
    
    .modal.show .modal-dialog {
        transform: scale(1);
    }
    
    /* Modal Buttons */
    #{{ modal_id }} .btn-primary {
        background: #4F46E5;
        border: none;
        font-weight: 600;
        padding: 0.75rem 2rem;
    }
    
    #{{ modal_id }} .btn-primary:hover {
        background: #4338CA;
    }
    
    #{{ modal_id }} .btn-light {
        background: #F3F4F6;
        border: none;
        color: #374151;
        font-weight: 600;
        padding: 0.75rem 2rem;
    }
    
    #{{ modal_id }} .btn-light:hover {
        background: #E5E7EB;
    }
</style>

<script>
// Initialize modal functionality
(function() {
    const modalId = '{{ modal_id }}';
    const modal = document.getElementById(modalId);
    
    if (modal) {
        // Store callback function
        window['{{ modal_id }}_callback'] = null;
        
        // Confirm button click handler
        const confirmBtn = document.getElementById(modalId + 'Confirm');
        if (confirmBtn) {
            confirmBtn.addEventListener('click', function() {
                const callback = window['{{ modal_id }}_callback'];
                if (callback && typeof callback === 'function') {
                    callback();
                }
                // Close modal
                const bsModal = bootstrap.Modal.getInstance(modal);
                if (bsModal) {
                    bsModal.hide();
                }
            });
        }
    }
})();

// Global function to show modal
window.showModal = function(modalId, title, body, onConfirm) {
    const modal = document.getElementById(modalId);
    if (!modal) {
        console.error('Modal not found:', modalId);
        return;
    }
    
    // Update title if provided
    if (title) {
        const titleElement = document.getElementById(modalId + 'Label');
        if (titleElement) {
            titleElement.textContent = title;
        }
    }
    
    // Update body if provided
    if (body) {
        const bodyElement = document.getElementById(modalId + 'Body');
        if (bodyElement) {
            bodyElement.innerHTML = body;
        }
    }
    
    // Store callback
    if (onConfirm) {
        window[modalId + '_callback'] = onConfirm;
    }
    
    // Show modal
    const bsModal = new bootstrap.Modal(modal);
    bsModal.show();
};

// Global function to hide modal
window.hideModal = function(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) {
        const bsModal = bootstrap.Modal.getInstance(modal);
        if (bsModal) {
            bsModal.hide();
        }
    }
};
</script>
