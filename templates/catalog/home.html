{% extends 'base.html' %}
{% load static %}

{% block title %}Home - Sierra Luxe{% endblock %}

{% block extra_css %}
<style>
    body {
        margin: 0;
        padding: 0;
    }
    
    main {
        margin: 0;
        padding: 0;
    }
    
    .hero-banner {
        width: 100%;
        height: 600px;
        object-fit: cover;
        display: block;
    }
    
    .hero-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    }
    
    .hero-overlay h1 {
        font-size: 4rem;
        font-weight: bold;
        margin-bottom: 1rem;
        letter-spacing: 3px;
    }
    
    .hero-overlay h2 {
        font-size: 2rem;
        font-weight: 300;
        margin-bottom: 2rem;
        letter-spacing: 2px;
    }
    
    .btn-shop {
        background: linear-gradient(45deg, #d4a017, #f4d03f);
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #1a1a2e;
        border-radius: 30px;
        transition: all 0.3s ease;
    }
    
    .btn-shop:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(212, 160, 23, 0.4);
    }
</style>
{% endblock %}

{% block content %}
<div class="position-relative">
    <img src="/media/landing-page-banner/website-banner.jpg" alt="Sierra Luxe Banner" class="hero-banner">
    <div class="hero-overlay">
        <h1>SIERRA LUXE</h1>
        <h2>Authentic African Fashion</h2>
        <a href="{% url 'catalog:product_list' %}" class="btn btn-shop">SHOP NOW</a>
    </div>
</div>
{% endblock %}
